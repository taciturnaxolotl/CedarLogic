name: Deploy CedarLogic

on:
  push:
    branches: [web, master]
    paths: ["web/**"]
  workflow_dispatch:

permissions:
  deployments: write

jobs:
  deploy:
    uses: taciturnaxolotl/dots/.github/workflows/deploy-service.yml@main
    with:
      service: cedarlogic
      branch: web
      work_dir: web
      build_command: "bun run parse-gates && bun run build && chmod -R g+rX dist/"
      health_url: https://cedarlogic.dunkirk.sh/api/health
    secrets:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
